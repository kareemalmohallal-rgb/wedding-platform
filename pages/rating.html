<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>التقييمات</title>
  <link rel="stylesheet" href="../css/rating.css">
  <link rel="stylesheet" href="../css/main.css">
</head>

<body>

<header class="header">
  <div class="logo">متعهد الحفلات</div>

  <nav class="nav">
    <a href="../home.html">الرئيسية</a>
    <a href="../pages/contractors.html">المتعهدين</a>
    <a href="../pages/service.html">الخدمات</a>
    <a href="../pages/rating.html">التقييمات</a>
  </nav>
</header>
<main class="container">

  <h1>التقييمات</h1>

  <button class="add-btn" onclick="openModal()">+ إضافة تقييم</button>

  <div id="ratingsList" class="ratings">

    <div class="card">
      <h3>أحمد محمد</h3>
      <div>⭐⭐⭐⭐⭐</div>
      <p>خدمة ممتازة جداً</p>
      <small>2025-07-17</small>
    </div>

  </div>

  

</main>

<!-- Modal -->
<div id="ratingModal" class="modal">
  <div class="modal-box">

    <span onclick="closeModal()">✖</span>

    <h3>إضافة تقييم</h3>

    <form onsubmit="addRating(event)">

      <input type="text" id="name" placeholder="اسم العميل" required>

      <select id="stars" required>
        <option value="5">⭐⭐⭐⭐⭐</option>
        <option value="4">⭐⭐⭐⭐</option>
        <option value="3">⭐⭐⭐</option>
        <option value="2">⭐⭐</option>
        <option value="1">⭐</option>
      </select>

      <textarea id="comment" placeholder="اكتب تعليقك..." required></textarea>

      <button type="submit">إرسال</button>

    </form>

  </div>
</div>

<script src="../js/rating.js"></script>
</body>
</html>
